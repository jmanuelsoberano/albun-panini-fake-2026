<section class="stats section-shell" aria-label="Resumen del album">
  <article>
    <span>{{ ownedCount() }}</span>
    <small>Cromos pegados</small>
  </article>
  <article>
    <span>{{ totalCount() }}</span>
    <small>Total del album</small>
  </article>
  <article>
    <span>{{ progress() }}%</span>
    <small>Progreso</small>
  </article>
  <article>
    <span>{{ duplicateTotal() }}</span>
    <small>Repetidos</small>
  </article>
</section>
